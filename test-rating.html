<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Component Test</title>
    <script type="module">
        // Import the component
        import { UIRating } from './packages/ui-core/src/components/ui-rating.ts';
        
        // Test the component
        console.log('UIRating component:', UIRating);
        console.log('Custom elements:', customElements);
        
        // Check if component is already registered
        const existing = customElements.get('ui-rating');
        console.log('Existing ui-rating:', existing);
        
        if (!existing) {
            customElements.define('ui-rating', UIRating);
            console.log('UIRating registered successfully');
        } else {
            console.log('UIRating already registered');
        }
    </script>
</head>
<body>
    <h1>Rating Component Test</h1>
    <ui-rating value="3" max="5" variant="default" size="md" tone="warning"></ui-rating>
    <p>Check console for registration status</p>
</body>
