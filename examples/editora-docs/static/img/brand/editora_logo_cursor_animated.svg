<svg role="img" aria-labelledby="anim-title anim-desc"
     width="280" height="52" viewBox="0 0 280 52"
     fill="none" xmlns="http://www.w3.org/2000/svg">
  <title id="anim-title">Editora animated wordmark</title>
  <desc id="anim-desc">The ribbon E mark draws in path-by-path, then the logotype fades in.</desc>

  <defs>
    <!-- Light-surface gradient fills -->
    <linearGradient id="a-blueFold" x1="18" y1="62" x2="67" y2="17" gradientUnits="userSpaceOnUse">
      <stop stop-color="#255CFF"/><stop offset="1" stop-color="#12A8FF"/>
    </linearGradient>
    <linearGradient id="a-blueTop" x1="54" y1="18" x2="174" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B7DFF"/><stop offset="1" stop-color="#0878EA"/>
    </linearGradient>
    <linearGradient id="a-blueSpine" x1="16" y1="61" x2="57" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1557F4"/><stop offset="1" stop-color="#4C44F2"/>
    </linearGradient>
    <linearGradient id="a-blueInner" x1="57" y1="118" x2="101" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3E5EF7"/><stop offset="1" stop-color="#36B9F8"/>
    </linearGradient>
    <linearGradient id="a-purpleMid" x1="59" y1="86" x2="151" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6273F2"/><stop offset="1" stop-color="#765DE8"/>
    </linearGradient>
    <linearGradient id="a-purpleFold" x1="18" y1="157" x2="86" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5F4AF3"/><stop offset="0.55" stop-color="#6E55EF"/><stop offset="1" stop-color="#7A43D6"/>
    </linearGradient>
    <linearGradient id="a-greenBottom" x1="57" y1="154" x2="174" y2="183" gradientUnits="userSpaceOnUse">
      <stop stop-color="#37A8CA"/><stop offset="0.35" stop-color="#14B9A8"/><stop offset="1" stop-color="#2EC38D"/>
    </linearGradient>

    <!--
      Animation strategy:
      Each path fades in via opacity (0→1). Staggered 80ms apart.
      Paths ordered top-to-bottom matching how the eye reads the "E":
        1. top fold       → 0ms
        2. top ribbon     → 80ms
        3. spine          → 160ms
        4. inner diagonal → 240ms
        5. mid ribbon     → 320ms
        6. bottom fold    → 400ms
        7. bottom ribbon  → 480ms
      Text fades in at 580ms with a slightly longer duration.
      Total animation: ~880ms. Runs once (fill-mode: forwards).
    -->
  </defs>

  <style>
    @keyframes et-fade-in {
      from { opacity: 0; transform: translateY(1px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }
    @keyframes et-text-in {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .et-p1 { animation: et-fade-in 200ms 0ms   both ease-out; }
    .et-p2 { animation: et-fade-in 200ms 80ms  both ease-out; }
    .et-p3 { animation: et-fade-in 200ms 160ms both ease-out; }
    .et-p4 { animation: et-fade-in 200ms 240ms both ease-out; opacity: 0.92; }
    .et-p5 { animation: et-fade-in 200ms 320ms both ease-out; }
    .et-p6 { animation: et-fade-in 200ms 400ms both ease-out; }
    .et-p7 { animation: et-fade-in 200ms 480ms both ease-out; }
    .et-tx { animation: et-text-in 260ms 580ms both ease-out; }

    /* Respect reduced-motion: skip to final state instantly */
    @media (prefers-reduced-motion: reduce) {
      .et-p1,.et-p2,.et-p3,.et-p4,.et-p5,.et-p6,.et-p7,.et-tx {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>

  <g transform="translate(0, 1.5) scale(0.2379)">
    <path class="et-p1" d="M17 61 L62 18 H103 L57 62 H17 Z"                    fill="url(#a-blueFold)"/>
    <path class="et-p2" d="M62 18 H174 L145 46 H64 C60.2 46 57 49.2 57 53 V62 L103 18 Z" fill="url(#a-blueTop)"/>
    <path class="et-p3" d="M17 61 H57 V118 L17 145 Z"                          fill="url(#a-blueSpine)"/>
    <path class="et-p4" d="M57 85 H103 L74 114 H57 Z"                          fill="url(#a-blueInner)"/>
    <path class="et-p5" d="M84 85 H151 L122 114 H58 Z"                         fill="url(#a-purpleMid)"/>
    <path class="et-p6" d="M17 156 L57 118 L57 154 L86 154 L56 183 L37 183 Z" fill="url(#a-purpleFold)"/>
    <path class="et-p7" d="M57 154 H174 L145 183 H37 L66 154 Z"                fill="url(#a-greenBottom)"/>
  </g>

  <text class="et-tx"
    x="56" y="35"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="28"
    letter-spacing="-0.56"
    fill="#18181B">Editora</text>
</svg>
