<svg role="img" aria-labelledby="wm-title wm-desc"
     width="280" height="52" viewBox="0 0 280 52"
     fill="none" xmlns="http://www.w3.org/2000/svg">
  <title id="wm-title">Editora wordmark — light</title>
  <desc id="wm-desc">Ribbon E mark beside the Editora logotype, for light surfaces.</desc>

  <defs>
    <!-- Mark gradients (same stops as blocks, scaled into 0 0 196 206 then transformed) -->
    <linearGradient id="wm-blueFold" x1="18" y1="62" x2="67" y2="17" gradientUnits="userSpaceOnUse">
      <stop stop-color="#255CFF"/><stop offset="1" stop-color="#12A8FF"/>
    </linearGradient>
    <linearGradient id="wm-blueTop" x1="54" y1="18" x2="174" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B7DFF"/><stop offset="1" stop-color="#0878EA"/>
    </linearGradient>
    <linearGradient id="wm-blueSpine" x1="16" y1="61" x2="57" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1557F4"/><stop offset="1" stop-color="#4C44F2"/>
    </linearGradient>
    <linearGradient id="wm-blueInner" x1="57" y1="118" x2="101" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3E5EF7"/><stop offset="1" stop-color="#36B9F8"/>
    </linearGradient>
    <linearGradient id="wm-purpleMid" x1="59" y1="86" x2="151" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6273F2"/><stop offset="1" stop-color="#765DE8"/>
    </linearGradient>
    <linearGradient id="wm-purpleFold" x1="18" y1="157" x2="86" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5F4AF3"/><stop offset="0.55" stop-color="#6E55EF"/><stop offset="1" stop-color="#7A43D6"/>
    </linearGradient>
    <linearGradient id="wm-purpleFoldShade" x1="34" y1="183" x2="59" y2="119" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F39D6" stop-opacity="0.28"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="wm-greenBottom" x1="57" y1="154" x2="174" y2="183" gradientUnits="userSpaceOnUse">
      <stop stop-color="#37A8CA"/><stop offset="0.35" stop-color="#14B9A8"/><stop offset="1" stop-color="#2EC38D"/>
    </linearGradient>
    <linearGradient id="wm-overlay" x1="35" y1="28" x2="150" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.20"/><stop offset="0.45" stop-color="white" stop-opacity="0.06"/><stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!--
    Mark: native coords 0 0 196 206 → scale to 49px tall (canvas height=52, 1.5px pad top/bottom)
    scale = 49/206 ≈ 0.2379
    translate so mark sits centred vertically: y offset = (52 - 49) / 2 = 1.5
  -->
  <g transform="translate(0, 1.5) scale(0.2379)">
    <path d="M17 61 L62 18 H103 L57 62 H17 Z"                    fill="url(#wm-blueFold)"/>
    <path d="M62 18 H174 L145 46 H64 C60.2 46 57 49.2 57 53 V62 L103 18 Z" fill="url(#wm-blueTop)"/>
    <path d="M17 61 H57 V118 L17 145 Z"                          fill="url(#wm-blueSpine)"/>
    <path d="M57 85 H103 L74 114 H57 Z"                          fill="url(#wm-blueInner)"   opacity="0.92"/>
    <path d="M84 85 H151 L122 114 H58 Z"                         fill="url(#wm-purpleMid)"/>
    <path d="M17 156 L57 118 L57 154 L86 154 L56 183 L37 183 Z" fill="url(#wm-purpleFold)"/>
    <path d="M17 156 L57 118 L57 154 L37 183 Z"                  fill="url(#wm-purpleFoldShade)" opacity="0.45"/>
    <path d="M57 154 H174 L145 183 H37 L66 154 Z"                fill="url(#wm-greenBottom)"/>
    <path d="M17 61 L62 18 H174 L145 46 H64 C60.2 46 57 49.2 57 53 V85 H151 L122 114 H58 L57 118 L17 156 L37 183 H145 L174 154 H57 L17 145 Z"
          fill="url(#wm-overlay)" opacity="0.52"/>
  </g>

  <!-- Logotype: Inter 700, letter-spacing -0.02em, dark (#18181B) for light surfaces -->
  <text
    x="56"
    y="35"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="28"
    letter-spacing="-0.56"
    fill="#18181B">Editora</text>
</svg>
